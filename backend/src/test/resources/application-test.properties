# Test Configuration - Disable problematic auto-configurations
spring.main.allow-bean-definition-overriding=true

# Spring Security OAuth2 (not used in test - disable completely)
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.provider.google.authorization-uri=http://localhost
spring.security.oauth2.client.provider.google.token-uri=http://localhost

# Spring Session
spring.session.store-type=none