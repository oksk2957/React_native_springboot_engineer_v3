# Spring Application Name
spring.application.name=information-exam-backend

# 백엔드 포트 설정 (엡포트가 9000번을 쓰므로 백엔드는 9001번으로 실행)
server.port=${SERVER_PORT:9001}
# DEBUG: [2026-05-26] 외부 IP에서 접속 가능하도록 모든 인터페이스에 바인딩
# 원인: 기본값(localhost)으로는 외부에서 접속 불가
# 해결: 0.0.0.0으로 설정하여 모든 IP에서 접속 가능
server.address=0.0.0.0

# 세션tracking 모드 설정
server.servlet.session.tracking-modes=cookie

# ============================================
# Database Configuration (환경변수 사용)
# ============================================
# DEBUG: Supabase Pooler 연결을 위한 external_id 파라미터 추가 (2026-05-26)
# Pooler URL 형식: jdbc:postgresql://host:port/postgres?external_id=<project_ref>&sslmode=require
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?external_id=gmhznnwecujoafdisscl&prepareThreshold=0&options=-c%20client_encoding%3Dutf8&sslmode=require}
# DEBUG: Supabase Pooler 사용자명/비밀번호 설정 (2026-05-26)
