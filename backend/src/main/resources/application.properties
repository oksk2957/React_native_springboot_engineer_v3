# ============================================
# JPA м¶”к°Җ м„Өм •
# ============================================
spring.jpa.open-in-view=false
# ImprovedNamingStrategy: camelCase -> snake_case ліҖнҷҳ (createdAt -> created_at)
# мқҙ м„Өм •мқҙ @Column(name = "...")ліҙлӢӨ мҡ°м„ н•  мҲҳ мһҲм–ҙ л¬ём ң л°ңмғқ
# PhysicalNamingStrategyStandardImpl: @Column(name = "...")мқ„ мҡ°м„ мӢңн•Ё
# DEBUG: [2026-05-26] Hibernate 6.x нҳёнҷҳмқ„ мң„н•ҙ нҢЁнӮӨм§Җ кІҪлЎң мҲҳм •
# Hibernate 5: org.hibernate.cfg.PhysicalNamingStrategyStandardImpl
# Hibernate 6: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ============================================
# MyBatis м„Өм •
# ============================================
