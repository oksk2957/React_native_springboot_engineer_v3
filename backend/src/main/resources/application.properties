# spring.application.name
spring.application.name=information-exam-backend

# 서버 포트 설정 (프론트엔드가 9000을 사용하므로 백엔드는 9001로 설정)
server.port=9001

# 세션 정보 유지 방법 설정
server.servlet.session.tracking-modes=cookie

# MariaDB 설정 (사용 안함)
# spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# spring.datasource.url=jdbc:mariadb://localhost:3333/EmartDB
# spring.datasource.username=EmartDB
# spring.datasource.password=1234

# Supabase PostgreSQL 설정
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0&options=-c%20client_encoding%3Dutf8&sslmode=require
spring.datasource.username=postgres.gmhznnwecujoafdisscl
spring.datasource.password=wjdcjrlgkqrur
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# 테이블 구조와 연동 확인 (DB 스키마를 별도 관리하므로 validate 비활성화)
spring.jpa.hibernate.ddl-auto=none
# spring.jpa.hibernate.ddl-auto=validate
# SQL 출력은 Slf4j(logback의 org.hibernate.SQL)로 통일해 중복 로그 방지
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 로그: 애플리케이션은 INFO, SQL은 DEBUG로 출력
logging.level.com.example.informationexam=INFO
# Hibernate SQL 쿼리 로그 (버튼 클릭 시 실행되는 JPA 쿼리 확인)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# MyBatis 쿼리 로그 (XML 매퍼 실행 시 파라미터 포함)
logging.level.com.example.informationexam.mapper=DEBUG

# JWT 설정
jwt.secret=c2lsdmVyYmluZS10ZWNoLXNwcmluZy1kb21haW4tYWJjZGVmZ2gta2V5LXVzZXItc2VjcmV0LWtleS1wYXNzd29yZC0xMjM0NTY=
jwt.token-validity-in-seconds=1800
jwt.refresh-token-validity-in-seconds=43200

# Spring Session 설정 (JDBC 세션 대신 JWT 사용을 위해 비활성화)
spring.session.store-type=none

# Supabase 설정
supabase.url=https://gmhznnwecujoafdisscl.supabase.co

spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=https://gmhznnwecujoafdisscl.supabase.co/auth/v1/callback

# Mustache 설정
spring.mustache.prefix=classpath:/templates/
spring.mustache.suffix=.mustache
spring.mustache.expose-request-attributes=true
spring.mustache.expose-session-attributes=true
spring.mustache.cache=false

# JPA 설정 추가
spring.jpa.open-in-view=false
# PostgreSQL 카멜케이스 → 스네이크케이스 자동 변환
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# PostgreSQL quote identifier 정책 (대소문자 혼용 테이블/컬럼 대응)
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# MyBatis (쿼리는 XML 매퍼에만 작성)
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=50
# 콘솔에 실행 SQL / 파라미터 출력 (Slf4j → logback)
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# Character Encoding 설정
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
