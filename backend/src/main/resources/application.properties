# Spring Application Name
spring.application.name=information-exam-backend

# DEBUG: [2026-06-10] 수정37 - .env 의존성 완전 제거
# 원인: Spring Boot 3.x의 optional:file:.env 로딩이 CWD/변수참조 문제로 불안정
# 해결: 모든 설정값을 application.properties에 직접 명시 (환경변수 오버라이드 유지)
# spring.config.import=optional:file:.env[.properties]

# 백엔드 포트 설정 (엡포트가 9000번을 쓰므로 백엔드는 9001번으로 실행)
server.port=9001
# DEBUG: [2026-05-26] 외부 IP에서 접속 가능하도록 모든 인터페이스에 바인딩
# 원인: 기본값(localhost)으로는 외부에서 접속 불가
# 해결: 0.0.0.0으로 설정하여 모든 IP에서 접속 가능
server.address=0.0.0.0

# 세션tracking 모드 설정
server.servlet.session.tracking-modes=cookie

# ============================================
# Database Configuration (환경변수 사용)
# ============================================
# DEBUG: Supabase Pooler 연결을 위한 external_id 파라미터 추가 (2026-05-26)
# Pooler URL 형식: jdbc:postgresql://host:port/postgres?external_id=<project_ref>&sslmode=require
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?external_id=gmhznnwecujoafdisscl&prepareThreshold=0&options=-c%20client_encoding%3Dutf8&sslmode=require
# DEBUG: Supabase Pooler 사용자명/비밀번호 설정 (2026-05-26)
spring.datasource.username=postgres.gmhznnwecujoafdisscl
spring.datasource.password=wjdcjrlgkqrur
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 로깅 설정
logging.level.com.example.informationexam=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.informationexam.mapper=DEBUG

# ============================================
# JWT Configuration (환경변수 사용)
# ============================================
# DEBUG: [JWT-2026-05-28] JWT 토큰 유효기간을 12시간(43200초)으로 설정
# 원인: 사용자 요청으로 토큰 유효기간을 12시간으로 연장
# 해결: jwt.token-validity-in-seconds를 43200으로 설정
# DEBUG: [2026-06-08] jwt.secret을 안전한 기본값으로 설정
# 원인: ${JWT_SECRET:${SUPABASE_JWT_SECRET:}} 형식에서 빈 값이면 HMAC 서명 실패
# 해결: 최소 32자 이상 안전한 기본값 설정 (Supabase와 분리)
jwt.secret=${JWT_SECRET:my-secure-jwt-secret-key-for-backend-signing-minimum-32-chars-2026}
jwt.token-validity-in-seconds=43200
jwt.refresh-token-validity-in-seconds=86400

