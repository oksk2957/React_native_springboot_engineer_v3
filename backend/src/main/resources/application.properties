# Spring Application Name
spring.application.name=information-exam-backend

# 백엔드 포트 설정 (엡포트가 9000번을 쓰므로 백엔드는 9001번으로 실행)
server.port=${SERVER_PORT:9001}

# 세션tracking 모드 설정
server.servlet.session.tracking-modes=cookie

# ============================================
# Database Configuration (환경변수 사용)
# ============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0&options=-c%20client_encoding%3Dutf8&sslmode=require}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 로깅 설정
logging.level.com.example.informationexam=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.informationexam.mapper=DEBUG

# ============================================
# JWT Configuration (환경변수 사용)
# ============================================
jwt.secret=${JWT_SECRET:}
jwt.token-validity-in-seconds=${JWT_TOKEN_VALIDITY:1800}
jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_VALIDITY:43200}

